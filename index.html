<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>PackFound | Minecraft Packs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    header {
      background: #ff2d2d;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .lang {
      text-align: center;
      margin: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #ff2d2d;
      border-radius: 10px;
      width: 250px;
      padding: 15px;
      text-align: center;
    }

    .card h3 {
      color: #ff2d2d;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: #ff2d2d;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: darkred;
    }

    footer {
      text-align: center;
      padding: 15px;
      color: #777;
      margin-top: 30px;
    }
  </style>

</head>

<body>

<header>PACKFOUND</header>

<div class="lang">
  فارسی 🇮🇷 | English 🇺🇸
</div>

<div class="container">

  <div class="card">
    <h3>Red PvP Pack</h3>
    <p>32x FPS Boost Pack</p>
    <p>Price: 99,000 Toman</p>
    <a class="btn" href="#">Buy</a>
  </div>

  <div class="card">
    <h3>Dark FPS Pack</h3>
    <p>Clean & Smooth</p>
    <p>Price: 79,000 Toman</p>
    <a class="btn" href="#">Buy</a>
  </div>

</div>

<footer>
  © 2026 PackFound
</footer>

</body>
</html>
